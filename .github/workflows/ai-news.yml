name: AI News

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ai-news.yml'
      - 'scripts/fetch-ai-news.mjs'
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      force:
        description: '是否强制覆盖已存在文件'
        required: true
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate daily news
        if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch' && inputs.mode == 'daily' || github.event_name == 'push'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FORCE_REGENERATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
        run: node scripts/fetch-ai-news.mjs --daily ${{ env.FORCE_REGENERATE == 'true' && '--force' || '' }}

      - name: Generate weekly summary
        if: github.event_name == 'schedule' && github.event.schedule == '0 1 * * 0' || github.event_name == 'workflow_dispatch' && inputs.mode == 'weekly'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FORCE_REGENERATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
        run: node scripts/fetch-ai-news.mjs --weekly ${{ env.FORCE_REGENERATE == 'true' && '--force' || '' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/ai-news/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(ai-news): auto-generate $(date -u +%Y-%m-%d)"
          git push
