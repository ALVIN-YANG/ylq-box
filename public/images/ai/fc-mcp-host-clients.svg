<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200">
  <rect width="560" height="200" fill="#f8fafc"/>
  <text x="280" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">MCP: one host, many clients, many servers</text>
  <rect x="60" y="40" width="440" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1e40af">MCP Host (IDE / desktop app)</text>
  <rect x="100" y="76" width="100" height="52" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="150" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e40af">Client 1</text>
  <text x="150" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">to server A</text>
  <rect x="230" y="76" width="100" height="52" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="280" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e40af">Client 2</text>
  <text x="280" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">to server B</text>
  <rect x="360" y="76" width="100" height="52" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="410" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e40af">...</text>
  <path d="M150 128 L150 148 L120 148" stroke="#64748b" stroke-width="1.5" fill="none"/>
  <path d="M280 128 L280 148 L120 148" stroke="#64748b" stroke-width="1.5" fill="none"/>
  <path d="M410 128 L410 148 L440 148" stroke="#64748b" stroke-width="1.5" fill="none"/>
  <rect x="40" y="152" width="120" height="40" rx="6" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="100" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534">Server A</text>
  <text x="100" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#15803d">fs / db</text>
  <rect x="220" y="152" width="120" height="40" rx="6" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="280" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534">Server B</text>
  <text x="280" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#15803d">github / ...</text>
  <rect x="400" y="152" width="120" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="460" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">1:1 session each</text>
