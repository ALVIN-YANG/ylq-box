  <text x="280" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3730a3">MCP</text>
  <text x="280" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4f46e5">standard tool and resource wiring</text>
  <rect x="140" y="200" width="280" height="44" rx="6" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="280" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#166534">Function Call</text>
  <text x="280" y="234" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#15803d">schema-defined tools; host executes</text>
  <text x="280" y="276" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Higher layers depend on lower layers</text>
