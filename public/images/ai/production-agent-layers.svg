<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360">
  <rect width="560" height="360" fill="#f8fafc"/>
  <text x="280" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0f172a">Production AI stack (complexity grows downward)</text>
  <rect x="60" y="44" width="440" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="280" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#92400e">1 Edge inference</text>
  <text x="280" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#b45309">on-device, privacy, offline</text>
  <rect x="70" y="100" width="420" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="280" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1e40af">2 Agent loop</text>
  <text x="280" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1d4ed8">plan, act, observe, reflect + budgets</text>
  <rect x="80" y="156" width="400" height="48" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="280" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3730a3">3 Multimodal</text>
  <text x="280" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4f46e5">vision, audio, docs; fusion strategy</text>
  <rect x="90" y="212" width="380" height="48" rx="8" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="280" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#166534">4 Durable memory</text>
  <text x="280" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#15803d">working, episodic, semantic; TTL, isolation</text>
  <rect x="100" y="268" width="360" height="48" rx="8" fill="#fce7f3" stroke="#db2777"/>
  <text x="280" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#9d174d">5 Orchestration</text>
  <text x="280" y="306" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#be185d">multi-agent, events, MCP, observability</text>
  <text x="280" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Start simple; add layers when metrics justify cost</text>
</svg>
