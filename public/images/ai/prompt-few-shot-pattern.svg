  <text x="280" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">Few-shot: fix style with 1-3 Q-A pairs, then real question</text>
  <rect x="40" y="36" width="480" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
