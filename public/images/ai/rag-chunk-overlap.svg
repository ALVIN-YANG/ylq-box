<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140">
  <rect width="640" height="140" fill="#f8fafc"/>
  <text x="320" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">Chunking with overlap (example)</text>
  <rect x="40" y="38" width="260" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="48" y="56" font-family="system-ui,sans-serif" font-size="9" fill="#1e40af">Chunk 1</text>
  <text x="48" y="72" font-family="system-ui,sans-serif" font-size="8" fill="#475569">...leave rules. Year1: 5d, Year3: 10d</text>
  <rect x="200" y="38" width="260" height="44" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="208" y="56" font-family="system-ui,sans-serif" font-size="9" fill="#92400e">Overlap</text>
  <text x="208" y="72" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">Year3: 10d (shared tail / head)</text>
  <rect x="360" y="38" width="240" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="368" y="56" font-family="system-ui,sans-serif" font-size="9" fill="#1e40af">Chunk 2</text>
  <text x="368" y="72" font-family="system-ui,sans-serif" font-size="8" fill="#475569">Year3: 10d, Year5: 15d...</text>
  <text x="320" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Overlap keeps split sentences retrievable</text>
</svg>
