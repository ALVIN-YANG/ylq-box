<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#f8fafc"/>
  <text x="320" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#0f172a">Config merge: user first, then project</text>
  <text x="320" y="58" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Filenames: oh-my-openagent or legacy oh-my-opencode (see upstream docs)</text>
  <rect x="80" y="88" width="480" height="72" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="118" font-family="monospace" font-size="12" fill="#0f172a">/.config/opencode/</text>
  <text x="100" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#475569">opencode.json, plugin JSON / JSONC (user-wide)</text>
  <text x="520" y="132" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb" font-weight="600">1 load</text>
  <path d="M320 160 L320 188" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="320,196 314,188 326,188" fill="#64748b"/>
  <rect x="80" y="204" width="480" height="88" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="234" font-family="monospace" font-size="12" fill="#1e3a8a">project/.opencode/</text>
  <text x="100" y="256" font-family="system-ui,sans-serif" font-size="11" fill="#1e40af">Overrides user config for this repo</text>
  <text x="100" y="276" font-family="system-ui,sans-serif" font-size="11" fill="#475569">If both legacy and new basenames exist, upstream defines precedence; keep one file to avoid surprises</text>
  <text x="520" y="248" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb" font-weight="600">2 override</text>
  <rect x="80" y="308" width="480" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="320" y="332" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">JSONC: comments and trailing commas; optional $schema for editor hints</text>
</svg>
