<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400">
  <rect width="560" height="400" fill="#f8fafc"/>
  <text x="280" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#0f172a">SSH from phone or tablet to dev host</text>
  <rect x="360" y="64" width="160" height="220" rx="18" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <rect x="372" y="78" width="136" height="168" rx="6" fill="#0f172a"/>
